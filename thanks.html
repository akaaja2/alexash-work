<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks — Alex Ash</title>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0c0b09;
      color: #ede3d0;
      font-family: 'Courier New', monospace;
    }
    .thanks-card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 48px 36px;
      background: rgba(20, 18, 15, 0.6);
      border: 1px solid #2a2520;
      border-radius: 12px;
    }
    .thanks-tag {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c97b1a;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      color: #b8ac98;
      margin-bottom: 28px;
    }
    .home-link {
      display: inline-block;
      padding: 12px 28px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0c0b09;
      background: #c97b1a;
      border: 1px solid #c97b1a;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .home-link:hover { background: transparent; color: #c97b1a; }
  </style>
</head>
<body>
  <main class="thanks-card">
    <div class="thanks-tag">Message sent</div>
    <h1>Thanks — it's on its way.</h1>
    <p>Your message has landed. I'll get back to you within roughly two business days. In the meantime, feel free to head back and explore.</p>
    <a class="home-link" href="/">← Back to home</a>
  </main>
</body>
</html>
