<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eye Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #wrap {
    position: relative;
    display: inline-block;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }
  #photo {
    display: block;
    width: 480px;
    height: 480px;
    object-fit: cover;
    pointer-events: none;
    user-select: none;
  }
  #eye-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
</style>
</head>

<div id="wrap">
  <img id="photo" alt="headshot">

    <circle id="iris-r" cx="57.0" cy="32.5" r="4.2" fill="rgba(255,255,255,0.08)" stroke="none"/>
    <!-- Pupils -->
    <circle id="pupil-l" cx="37.5" cy="32.5" r="1.7" fill="rgba(0,0,0,0.75)"/>
    <circle id="pupil-r" cx="57.0" cy="32.5" r="1.7" fill="rgba(0,0,0,0.75)"/>
    <!-- Subtle glint -->
    <circle id="glint-l" cx="38.3" cy="31.8" r="0.55" fill="rgba(255,255,255,0.55)"/>
    <circle id="glint-r" cx="57.8" cy="31.8" r="0.55" fill="rgba(255,255,255,0.55)"/>
  </svg>
</div>

const eyes = [
  { x: 37.5, y: 32.5, pupil: document.getElementById('pupil-l'), glint: document.getElementById('glint-l') },
  { x: 57.0, y: 32.5, pupil: document.getElementById('pupil-r'), glint: document.getElementById('glint-r') },
];
const IRIS_R = 4.2;
const PUPIL_R = 1.7;
const GLINT_OFFSET = { dx: 0.8, dy: -0.7 };

const wrap = document.getElementById('wrap');

document.addEventListener('mousemove', e => {
  const rect = wrap.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 100;
  const my = ((e.clientY - rect.top) / rect.height) * 100;

  eyes.forEach(eye => {
    const dx = mx - eye.x;
    const dy = my - eye.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxTravel = IRIS_R * 0.52;
    const travel = Math.min(dist, maxTravel);
    const angle = Math.atan2(dy, dx);

    const px = eye.x + Math.cos(angle) * travel;
    const py = eye.y + Math.sin(angle) * travel;

    eye.pupil.setAttribute('cx', px.toFixed(3));
    eye.pupil.setAttribute('cy', py.toFixed(3));

    // Glint stays slightly offset from pupil center
    eye.glint.setAttribute('cx', (px + GLINT_OFFSET.dx).toFixed(3));
    eye.glint.setAttribute('cy', (py + GLINT_OFFSET.dy).toFixed(3));
  });
});
</script>
